<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer - 智能代码审查工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            color: #666;
            font-size: 0.9em;
        }

        .result-section {
            display: none;
        }

        .summary-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .summary-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .summary-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .result-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-title {
            font-weight: 600;
            color: #333;
        }

        .result-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .badge-red {
            background: #fee;
            color: #c00;
        }

        .badge-yellow {
            background: #fff3cd;
            color: #856404;
        }

        .badge-green {
            background: #d4edda;
            color: #155724;
        }

        .result-summary {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .issues-list, .suggestions-list {
            margin-top: 10px;
        }

        .issue-item, .suggestion-item {
            padding: 8px 12px;
            background: #fff;
            border-left: 3px solid #667eea;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .severity {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
            margin-right: 8px;
            text-transform: uppercase;
        }

        .severity-critical { background: #dc3545; color: white; }
        .severity-high { background: #fd7e14; color: white; }
        .severity-medium { background: #ffc107; color: #333; }
        .severity-low { background: #28a745; color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .full-summary {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🤖 AI Code Reviewer</h1>
            <p>基于人工智能的智能代码审查工具</p>
        </div>

        <!-- 配置卡片 -->
        <div class="card">
            <h2>⚙️ 审查配置</h2>
            <form id="reviewForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="platform">平台 *</label>
                        <select id="platform" required>
                            <option value="github">GitHub</option>
                            <option value="gitlab">GitLab</option>
                        </select>
                    </div>

                    <div class="form-group" id="githubTokenGroup">
                        <label for="githubToken">GitHub Token *</label>
                        <input type="password" id="githubToken" required placeholder="ghp_...">
                    </div>

                    <div class="form-group" id="tokenGroup" style="display: none;">
                        <label for="gitlabToken">GitLab Token *</label>
                        <input type="password" id="gitlabToken" required placeholder="glpat-...">
                    </div>


                    <div class="form-group">
                        <label for="apiKey">AI API Key *</label>
                        <input type="password" id="apiKey" required placeholder="你的 AI API 密钥">
                    </div>

                    <div class="form-group">
                        <label for="branch">分支 *</label>
                        <input type="text" id="branch" required placeholder="feature/my-feature">
                    </div>

                    <div class="form-group">
                        <label for="base">基础分支</label>
                        <input type="text" id="base" value="master" placeholder="master/main">
                    </div>

                    <div class="form-group">
                        <label for="repo">仓库（可选）</label>
                        <input type="text" id="repo" placeholder="owner/repo，留空自动检测">
                    </div>

                    <div class="form-group">
                        <label for="provider">AI 提供商</label>
                        <select id="provider">
                            <option value="qwen">千问</option>
                            <option value="anthropic">Anthropic (Claude)</option>
                            <option value="openai">OpenAI</option>
                            <option value="doubao">字节豆包</option>
                            <option value="custom">自定义</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="model">模型名称</label>
                        <input type="text" id="model" value="qwen3.5-plus">
                    </div>

                    <div class="form-group" id="baseUrlGroup" style="display: none;">
                        <label for="baseUrl">API URL</label>
                        <input type="text" id="baseUrl" placeholder="https://api.example.com/v1">
                    </div>

                    <div class="form-group">
                        <label for="projectRoot">项目根目录</label>
                        <input type="text" id="projectRoot" value=".">
                    </div>

                    <div class="form-group" id="gitlabUrlGroup" style="display: none;">
                        <label for="gitlabUrl">GitLab 地址 (可选)</label>
                        <input type="text" id="gitlabUrl" placeholder="https://gitlab.example.com">
                        <span style="font-size:0.8em;color:#666;margin-top:2px;display:block;">如果不填，默认使用 gitlab.com</span>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="manualFiles">📝 手动指定相关文件 (可选)</label>
                        <input type="text" id="manualFiles" placeholder="例如：src/service/UserService.java, src/controller/UserController.java">
                        <span style="font-size:0.8em;color:#666;margin-top:2px;display:block;">用逗号分隔文件路径，帮助更快分析调用链；留空则自动下载全部 Python 文件</span>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="startBtn">
                        🚀 开始审查
                    </button>
                    <button type="button" class="btn btn-secondary" id="loadEnvBtn">
                        📁 从.env 加载
                    </button>
                </div>
            </form>

            <!-- 进度条 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备中...</div>
            </div>
        </div>

        <!-- 结果卡片 -->
        <div class="card result-section" id="resultSection">
            <h2>📊 审查结果</h2>

            <!-- 摘要统计 -->
            <div class="summary-card" id="summaryCard">
                <div class="summary-item">
                    <div class="summary-value" id="totalFiles">0</div>
                    <div class="summary-label">更改文件</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="totalElements">0</div>
                    <div class="summary-label">审查项</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="totalIssues" style="color: #dc3545;">0</div>
                    <div class="summary-label">发现问题</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="totalSuggestions" style="color: #28a745;">0</div>
                    <div class="summary-label">改进建议</div>
                </div>
            </div>

            <!-- 详细结果 -->
            <div id="resultsList"></div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>完整审查报告</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="full-summary" id="fullSummary"></div>
        </div>
    </div>

    <script>
        // 监听平台变化，显示/隐藏对应的 Token 输入框和 GitLab URL
        document.getElementById('platform').addEventListener('change', function(e) {
            const tokenGroup = document.getElementById('tokenGroup');
            const githubTokenGroup = document.getElementById('githubTokenGroup');
            const gitlabUrlGroup = document.getElementById('gitlabUrlGroup');

            if (e.target.value === 'gitlab') {
                tokenGroup.style.display = 'flex';
                githubTokenGroup.style.display = 'none';
                gitlabUrlGroup.style.display = 'flex';
            } else {
                tokenGroup.style.display = 'none';
                githubTokenGroup.style.display = 'flex';
                gitlabUrlGroup.style.display = 'none';
            }
        });

        // 监听 provider 变化，显示/隐藏 baseUrl 输入框
        document.getElementById('provider').addEventListener('change', function(e) {
            const baseUrlGroup = document.getElementById('baseUrlGroup');
            baseUrlGroup.style.display = e.target.value === 'custom' ? 'flex' : 'none';
        });

        // 从环境变量加载
        document.getElementById('loadEnvBtn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/load-env');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('githubToken').value = data.github_token || '';
                    document.getElementById('apiKey').value = data.api_key || '';
                    alert('已从.env 文件加载配置');
                }
            } catch (error) {
                console.log('无法从.env 加载:', error);
                alert('.env 文件不存在或加载失败\n请手动输入 API 密钥');
            }
        });

        // 表单提交
        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const platform = document.getElementById('platform').value;
            const gitlabToken = document.getElementById('gitlabToken').value;
            const githubToken = document.getElementById('githubToken').value;
            const gitlabUrl = document.getElementById('gitlabUrl').value;

            const params = {
                platform: platform,
                gitlab_url: gitlabUrl || null,
                gitlab_token: gitlabToken,
                github_token: githubToken,
                api_key: document.getElementById('apiKey').value,
                branch: document.getElementById('branch').value,
                base: document.getElementById('base').value,
                repo: document.getElementById('repo').value || null,
                provider: document.getElementById('provider').value,
                model: document.getElementById('model').value,
                base_url: document.getElementById('baseUrl').value || null,
                project_root: document.getElementById('projectRoot').value,
                manual_files: document.getElementById('manualFiles').value || null
            };

            // 更新 UI 状态
            const startBtn = document.getElementById('startBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressText = document.getElementById('progressText');
            const progressFill = document.getElementById('progressFill');
            const resultSection = document.getElementById('resultSection');

            startBtn.disabled = true;
            progressContainer.style.display = 'block';
            resultSection.style.display = 'none';

            try {
                // 步骤 1: 获取 diff
                progressText.textContent = '正在从 GitHub 获取差异...';
                progressFill.style.width = '20%';

                const response = await fetch('/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });

                progressText.textContent = '正在分析代码...';
                progressFill.style.width = '50%';

                const data = await response.json();

                if (data.success) {
                    progressText.textContent = '审查完成！';
                    progressFill.style.width = '100%';

                    // 显示结果
                    displayResults(data);
                    resultSection.style.display = 'block';
                } else {
                    alert('审查失败：' + data.message);
                }
            } catch (error) {
                alert('请求失败：' + error.message);
            } finally {
                setTimeout(() => {
                    startBtn.disabled = false;
                    progressContainer.style.display = 'none';
                    progressFill.style.width = '0%';
                }, 2000);
            }
        });

        // 显示结果
        function displayResults(data) {
            // 更新摘要
            if (data.summary) {
                document.getElementById('totalFiles').textContent = data.summary.total_files || 0;
                document.getElementById('totalElements').textContent = data.summary.total_elements || 0;
                document.getElementById('totalIssues').textContent = data.summary.total_issues || 0;
                document.getElementById('totalSuggestions').textContent = data.summary.total_suggestions || 0;
            }

            // 渲染结果列表
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            data.results.forEach((result, index) => {
                const item = document.createElement('div');
                item.className = 'result-item';

                const badges = [];
                if (result.issues_count > 0) {
                    badges.push(`<span class="badge badge-red">${result.issues_count} 个问题</span>`);
                }
                if (result.suggestions_count > 0) {
                    badges.push(`<span class="badge badge-yellow">${result.suggestions_count} 条建议</span>`);
                }

                let issuesHtml = '';
                if (result.issues && result.issues.length > 0) {
                    issuesHtml = '<div class="issues-list"><strong>发现的问题:</strong><br>' +
                        result.issues.map(issue =>
                            `<div class="issue-item">
                                <span class="severity severity-${issue.severity}">${issue.severity}</span>
                                ${issue.description}
                            </div>`
                        ).join('') + '</div>';
                }

                let suggestionsHtml = '';
                if (result.suggestions && result.suggestions.length > 0) {
                    suggestionsHtml = '<div class="suggestions-list"><strong>改进建议:</strong><br>' +
                        result.suggestions.map(s =>
                            `<div class="suggestion-item">• ${s}</div>`
                        ).join('') + '</div>';
                }

                item.innerHTML = `
                    <div class="result-header">
                        <span class="result-title">${result.filename} ${result.element_name ? '(' + result.element_name + ')' : ''}</span>
                        <div class="result-badges">${badges.join('')}</div>
                    </div>
                    <div class="result-summary">
                        <strong>摘要:</strong> ${result.summary}
                        <button class="btn btn-secondary" style="margin-top:10px;padding:5px 10px;font-size:12px;"
                            onclick="showDetail(${JSON.stringify(result.full_summary || '').replace(/"/g, '&quot;')})">查看全部</button>
                    </div>
                    ${issuesHtml}
                    ${suggestionsHtml}
                `;

                resultsList.appendChild(item);
            });
        }

        // 显示详情
        window.showDetail = function(summary) {
            document.getElementById('fullSummary').textContent = summary;
            document.getElementById('detailModal').classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('detailModal').classList.remove('active');
        };

        // 点击外部关闭弹窗
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
